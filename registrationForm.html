<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>

    <link rel="stylesheet" href="externalcss.css">

    <style>
        body {
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        form {
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            margin: 0 auto;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="password"],
        textarea,
        select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>

</head>





<body>
    <h1>Registration Form</h1>
    <form action="#" method="post">

        <label for="fullName">Full Name:</label><br>
        <input type="text" name="fullName" id="fullName" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" name="email" id="email" required><br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" name="phone" id="phone" required><br><br>

        <label for="gender">Gender:</label>
        <label for="male">Male</label>
        <input type="radio" name="gender" id="male" value="male" required>
        <label for="female">Female</label>
        <input type="radio" name="gender" id="female" value="female" required>
        <label for="other">Other</label>
       
        

        <label for="dob">Date of Birth:</label><br>
        <input type="date" name="dob" id="dob" required><br><br>

        <label for="password">Password:</label><br>
        <input type="password" name="password" id="password" placeholder="Type Your Password" required><br><br>

        <label for="confirmPassword">Confirm Password:</label><br>
        <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Retype Your Password"
            required><br><br>

        <label for="address">Address:</label><br>
        <textarea name="address" id="address" rows="4" cols="50" required></textarea><br><br>

        <label for="department">Department:</label><br>
        <select name="department" id="department" required>
            <option value="cse">CSE</option>
            <option value="eee">EEE</option>
            <option value="bba">BBA</option>
        </select><br><br>


        <input type="checkbox" name="terms" id="terms" required>
        <label for="terms">I agree to the terms and conditions</label><br><br>

        <button type="submit">Register</button>
        <button type="reset">Reset</button>


    </form>
</body>

</html>
